<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MathQuest 🚀 — Fun Math for Kids!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>

  <!-- Firebase SDK (compat) — must be in <head> before firebase-init.js -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>"/>
</head>
<body class="home-page">

  <!-- Floating background shapes -->
  <div class="bg-shapes">
    <div class="shape shape-1">➕</div>
    <div class="shape shape-2">✖️</div>
    <div class="shape shape-3">➖</div>
    <div class="shape shape-4">➗</div>
    <div class="shape shape-5">⭐</div>
    <div class="shape shape-6">🌟</div>
    <div class="shape shape-7">💫</div>
    <div class="shape shape-8">🎯</div>
  </div>

  <div class="home-container">
    <!-- Logo / Title -->
    <div class="logo-area">
      <div class="logo-icon">🚀</div>
      <h1 class="game-title">MathQuest</h1>
      <p class="game-subtitle">The Ultimate Math Adventure for Kids!</p>
    </div>

    <!-- Login Card -->
    <div class="card login-card" id="loginCard">
      <h2>👋 Who's Playing?</h2>

      <!-- Avatar picker -->
      <div class="avatar-picker">
        <p class="label">Pick your avatar:</p>
        <div class="avatars">
          <button class="avatar-btn active" data-avatar="🦁" onclick="selectAvatar(this)">🦁</button>
          <button class="avatar-btn" data-avatar="🐸" onclick="selectAvatar(this)">🐸</button>
          <button class="avatar-btn" data-avatar="🦊" onclick="selectAvatar(this)">🦊</button>
          <button class="avatar-btn" data-avatar="🐼" onclick="selectAvatar(this)">🐼</button>
          <button class="avatar-btn" data-avatar="🦄" onclick="selectAvatar(this)">🦄</button>
          <button class="avatar-btn" data-avatar="🐉" onclick="selectAvatar(this)">🐉</button>
          <button class="avatar-btn" data-avatar="🤖" onclick="selectAvatar(this)">🤖</button>
          <button class="avatar-btn" data-avatar="🧙" onclick="selectAvatar(this)">🧙</button>
        </div>
      </div>

      <div class="input-group">
        <input type="text" id="playerName" placeholder="Enter your name..." maxlength="16" autocomplete="off"/>
      </div>

      <button class="btn btn-primary btn-big" onclick="startAdventure()">
        🚀 Start Adventure!
      </button>

      <a href="/leaderboard" class="btn btn-secondary">
        🏆 Leaderboard
      </a>
    </div>

    <!-- Settings toggles -->
    <div class="settings-bar">
      <button class="toggle-btn" id="musicToggle" onclick="toggleMusic()" title="Music">
        🎵 Music: <span id="musicStatus">ON</span>
      </button>
      <button class="toggle-btn" id="sfxToggle" onclick="toggleSFX()" title="Sound Effects">
        🔊 SFX: <span id="sfxStatus">ON</span>
      </button>
      <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()" title="Theme">
        🌙 Dark Mode
      </button>
    </div>
  </div>

  <!-- firebase-init runs AFTER the SDK scripts above -->
  <script src="{{ url_for('static', filename='js/firebase-init.js') }}"></script>
  <script src="{{ url_for('static', filename='js/audio.js') }}"></script>
  <script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>
</html>
